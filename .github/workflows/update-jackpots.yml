name: Update jackpots

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: pip install requests

      - name: Mettre à jour jackpots.json
        run: python update_jackpots.py

      - name: Enregistrer les changements
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          if git diff --quiet jackpots.json; then
            echo "Aucun changement dans jackpots.json"
          else
            git add jackpots.json
            git commit -m "Mise à jour automatique des jackpots"
            git push
          fi
